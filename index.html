<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eser's Unity Games - GMD6</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #00d2ff;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .games-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .game-card {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            width: 250px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 210, 255, 0.2);
            border: 1px solid rgba(0, 210, 255, 0.3);
        }

        .game-card h2 {
            margin-top: 0;
            color: #fff;
        }

        .game-card p {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 20px;
        }

        .play-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .play-btn:hover {
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
        }

        footer {
            margin-top: 50px;
            color: #777;
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    <h1>🎮 Eser's Game Design Portfolio</h1>

    <div class="games-grid">
        <a href="Roll-a-ball/builds-web/index.html" class="game-card">
            <h2>Roll a Ball</h2>
            <p>A classic Unity tutorial game. Collect all the cubes to win!</p>
            <button class="play-btn">Play Now</button>
        </a>

    </div>

    <footer>
        <p>GMD - 6th Semester Projects</p>
    </footer>
</body>

</html>
